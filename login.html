<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Přihlášení do interní databáze</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#eeeeee;
}

.login-box {
  background:white;
  max-width:420px;
  margin:100px auto;
  padding:30px;
  border-radius:8px;
  box-shadow:0 2px 12px rgba(0,0,0,.25);
}

h1 {
  color:#b71c1c;
  text-align:center;
}

input {
  width:100%;
  padding:12px;
  margin:10px 0;
  font-size:16px;
  border:1px solid #ccc;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  background:#b71c1c;
  color:white;
  border:none;
  border-radius:6px;
  font-size:16px;
  cursor:pointer;
}

.error {
  color:#b71c1c;
  text-align:center;
  margin-top:15px;
}
</style>
</head>
<body>

<div class="login-box">
  <h1>Interní databáze</h1>
  <p>Přístup pouze pro oprávněné uživatele.</p>

  <input type="text" id="login" placeholder="Uživatelské jméno">
  <input type="password" id="password" placeholder="Heslo">

  <button onclick="loginUser()">Přihlásit se</button>

  <div class="error" id="error"></div>
</div>

<script>
function loginUser() {
  const login = document.getElementById("login").value;
  const password = document.getElementById("password").value;

  if (login === "admin" && password === "KRIMI1628") {
    sessionStorage.setItem("loggedIn", "true");
    window.location.href = "lokalizace.html";
  } else {
    document.getElementById("error").innerText = "Neplatné přihlašovací údaje.";
  }
}
</script>

</body>
</html>
