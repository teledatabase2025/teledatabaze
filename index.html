<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TKM - Telekomunikační modul</title>
</head>
<body>

<h1>TKM - Telekomunikační modul</h1>
<p>Zadejte telefonní číslo:</p>

<input type="text" id="userInput" placeholder="např. 603 194 3788">
<button onclick="go()">Vyhledat</button>

<script>
function normalize(text) {
  return text
    .toLowerCase()
    .replace(/\s+/g, "") // odstraní mezery
    .trim();
}

function go() {
  const val = normalize(document.getElementById("userInput").value);

  const pages = {
    "6031943788": "cislo1.html",
    "6031943788n": "cislo3.html",
    "2225584423": "cislo2.html"
  };

  if (pages[val]) {
    window.location.href = pages[val];
  } else {
    alert("Číslo nenalezeno");
  }
}
</script>


</body>
</html>
