<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TKM - Telekomunikační modul telefonních čísel a hovorů</title>
</head>
<body>

<h1>TKM - Telekomunikační modul telefonních čísel a hovorů</h1>
<p>Zadejte telefonní číslo:</p>

<input type="text" id="userInput" placeholder="ve tvaru 000 000 0000">
<button onclick="go()">Vyhledat</button>

<script>
function normalize(text) {
  return text
    .toLowerCase()
    .replace(/\s+/g, "") // odstraní mezery
    .trim();
}

function go() {
  const val = normalize(document.getElementById("userInput").value);

  const pages = {
    "6031943788": "https://tkm-fbf72a.webnode.cz/",
    "6031943788n": "https://tkm-fbf72a.webnode.cz/aktualizace/",
    "2225584423": "https://tkm-fbf72a.webnode.cz/2/"
  };

  if (pages[val]) {
    window.location.href = pages[val];
  } else {
    alert("Číslo nenalezeno");
  }
}
</script>


</body>
</html>
