function parseCoord(coord) {
  const match = coord.match(/([\d.]+)N,\s*([\d.]+)E/);
  return [parseFloat(match[1]), parseFloat(match[2])];
}

function mapyUrl(coord) {
  const [lat, lon] = parseCoord(coord);
  return `https://mapy.com/cs/zakladni?q=${lat}N%2C%20${lon}E&source=coor&id=${lon}%2C${lat}&ds=2&x=${lon}&y=${lat}&z=19`;
}

const map = L.map("map").setView([50.073, 14.452], 14);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 19
}).addTo(map);

const route = [];
const uniquePoints = [];

records.forEach((record) => {
  const time = record[0];
  const coord = record[1];
  const latlng = parseCoord(coord);

  route.push(latlng);

  const key = coord;
  if (!uniquePoints.some(p => p.coord === key)) {
    uniquePoints.push({ time, coord, latlng });
  }
});

L.polyline(route, {
  color: "#b71c1c",
  weight: 4,
  opacity: 0.8
}).addTo(map);

uniquePoints.forEach((point, index) => {
  const marker = L.circleMarker(point.latlng, {
    radius: index === uniquePoints.length - 1 ? 8 : 6,
    color: "#b71c1c",
    fillColor: index === uniquePoints.length - 1 ? "#1b8f3a" : "#b71c1c",
    fillOpacity: 0.85,
    weight: 2
  }).addTo(map);

  marker.bindPopup(`
    <strong>Čas:</strong> ${point.time}<br>
    <strong>Poloha BTS:</strong> ${point.coord}<br>
    <a href="${mapyUrl(point.coord)}" target="_blank" rel="noopener">Otevřít v Mapy.cz</a>
  `);
});

map.fitBounds(route);

const body = document.getElementById("dataBody");

records.forEach(row => {
  const time = row[0];
  const coord = row[1];
  const url = mapyUrl(coord);

  body.innerHTML += `
    <tr>
      <td>${time}</td>
      <td><a href="${url}" target="_blank" rel="noopener">${coord}</a></td>
    </tr>
  `;
});
